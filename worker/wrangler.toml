name = "candlescan-proxy"
main = "index.js"
compatibility_date = "2024-12-01"

# Free plan: 100 000 requests / day — plenty for personal use.
# Deploy: cd worker && npx wrangler deploy
#
# Secrets (set via CLI, not here):
#   wrangler secret put GATE_PASSPHRASE_HASH
#   wrangler secret put GATE_PRIVATE_KEY
#
# KV namespaces. Application data is split between CONFIG (long-lived,
# never TTL'd, e.g. GATE_PUBLIC_KEY) and CACHE (TTL'd, rebuildable —
# instrument maps, daily aggregates, news, last-quote). CANDLESCAN_KV is
# the legacy single-namespace binding kept around as a read fallback
# during the migration window; once the legacy namespace is empty, drop
# the binding here and delete the namespace via the CF dashboard.
#
# Create new namespaces with:
#   wrangler kv namespace create <BINDING_NAME>
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "527c95317e0141a3adf0b9a7cf384836"

[[kv_namespaces]]
binding = "CANDLESCAN_CONFIG"
id = "aadfb2721c5145dab70e992ddfdc9162"

[[kv_namespaces]]
binding = "CANDLESCAN_CACHE"
id = "89b539b9cc88444288eaab157aa39e80"

[[kv_namespaces]]
binding = "CANDLESCAN_KV"
id = "00f596cbf39d47cf87bd42bfafd48340"
