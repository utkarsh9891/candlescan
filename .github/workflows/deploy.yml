name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Any new push (branch or tag) cancels the current running deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Run tests FIRST — nothing else happens if tests fail
      - run: npm test

      # Auto-tag patch ONLY after tests pass (branch pushes only)
      - name: Auto-tag patch version
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          # Skip if HEAD already has a version tag
          EXISTING=$(git tag --points-at HEAD 2>/dev/null | grep '^v' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING — skipping auto-tag"
            exit 0
          fi

          # Find the highest existing tag by semver (not by commit distance)
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag (by semver): $LATEST"

          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Auto-tagged: $NEW_TAG"

      # Resolve the version to bake into the build
      # For tag pushes: use the exact tag name (avoids git describe ambiguity with multiple tags on same commit)
      # For branch pushes: use git describe (which picks up the auto-tag just created)
      - name: Resolve build version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --always)
          fi
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with explicit version
        run: npm run build
        env:
          CANDLESCAN_VERSION: ${{ steps.version.outputs.version }}

      - name: Verify version in build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Expected version: $VERSION"
          echo "index.html meta:"
          grep 'app-version' dist/index.html || true
          # Verify the meta tag contains the correct version
          grep -q "content=\"$VERSION\"" dist/index.html || { echo "WARNING: version mismatch in meta tag"; }
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "CandleScan" dist/index.html || { echo "CandleScan not in index.html"; exit 1; }
          echo "Build OK — version: $VERSION"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # Build categorized release notes from commit messages since last tag.
      #
      # Reference-tag selection is release-type aware:
      #   - PATCH release (e.g. v0.14.3)   → previous tag by semver (v0.14.2)
      #   - MINOR release (e.g. v0.14.0)   → previous MINOR tag (v0.13.0)
      #                                       so notes aggregate all patches
      #   - MAJOR release (e.g. v1.0.0)    → previous MAJOR tag (v0.0.0 or
      #                                       earliest minor if no prior major)
      #
      # Without this, a manual minor tag push would inherit the previous
      # patch as its reference and the release notes would only cover
      # 1 commit instead of the full feature set accumulated since the
      # last minor.
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Parse major/minor/patch from the tag (strip the leading v)
          VNUM="${VERSION#v}"
          MAJOR=$(echo "$VNUM" | cut -d. -f1)
          MINOR=$(echo "$VNUM" | cut -d. -f2)
          PATCH=$(echo "$VNUM" | cut -d. -f3 | sed 's/[^0-9].*//')

          echo "Parsed: major=$MAJOR minor=$MINOR patch=$PATCH"

          # Classify the release type to pick the right reference point
          if [ "$PATCH" = "0" ] && [ "$MINOR" = "0" ]; then
            RELEASE_TYPE="major"
            # Previous major = latest tag with MAJOR < current major, patch=0, minor=0
            PREV_TAG=$(git tag -l 'v*.0.0' --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          elif [ "$PATCH" = "0" ]; then
            RELEASE_TYPE="minor"
            # Previous minor = latest vX.Y.0 tag that isn't current
            PREV_TAG=$(git tag -l 'v*.*.0' --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.0$" | grep -v "^${VERSION}$" | head -1)
          else
            RELEASE_TYPE="patch"
            # Previous any = latest tag that isn't current (existing behavior)
            PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          fi

          echo "Release type: $RELEASE_TYPE"
          echo "Previous reference tag: ${PREV_TAG:-none}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "Changelog range: $RANGE"

          # Collect commits grouped by type
          FEATS=$(git log "$RANGE" --pretty=format:'- %s' --grep='^feat' --no-merges 2>/dev/null | sed 's/^- feat[:(]*/- /' || true)
          FIXES=$(git log "$RANGE" --pretty=format:'- %s' --grep='^fix' --no-merges 2>/dev/null | sed 's/^- fix[:(]*/- /' || true)
          CHORES=$(git log "$RANGE" --pretty=format:'- %s' --grep='^chore\|^refactor\|^docs\|^style\|^test\|^ci' --no-merges 2>/dev/null | sed 's/^- \(chore\|refactor\|docs\|style\|test\|ci\)[:(]*/- /' || true)
          OTHER=$(git log "$RANGE" --pretty=format:'- %s' --no-merges 2>/dev/null | grep -v -E '^- (feat|fix|chore|refactor|docs|style|test|ci)[:(]' | head -20 || true)

          # Build notes
          NOTES=""
          if [ -n "$FEATS" ]; then
            NOTES="${NOTES}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$CHORES" ]; then
            NOTES="${NOTES}## Maintenance\n${CHORES}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}## Other\n${OTHER}\n\n"
          fi

          # Count stats
          COMMIT_COUNT=$(git rev-list --count "$RANGE" --no-merges 2>/dev/null || echo 0)
          FILES_CHANGED=$(git diff --stat "$RANGE" 2>/dev/null | tail -1 || echo "")

          # Release type banner — helps users understand the scope
          RELEASE_BANNER=""
          if [ "$RELEASE_TYPE" = "minor" ] && [ -n "$PREV_TAG" ]; then
            RELEASE_BANNER="_Minor release — aggregates all patch releases since ${PREV_TAG}._\n\n"
          elif [ "$RELEASE_TYPE" = "major" ] && [ -n "$PREV_TAG" ]; then
            RELEASE_BANNER="_Major release — aggregates all changes since ${PREV_TAG}._\n\n"
          fi
          NOTES="${RELEASE_BANNER}${NOTES}---\n**${COMMIT_COUNT} commits** since ${PREV_TAG:-initial}\n${FILES_CHANGED}"

          # Write to file (avoids shell quoting issues)
          echo -e "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      # Create GitHub Release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)

          # Delete any existing release for this tag (idempotent re-runs)
          gh release delete "$VERSION" --yes 2>/dev/null || true

          PRERELEASE_FLAG=""
          if [ "$MAJOR" = "0" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            $PRERELEASE_FLAG

          echo "Created release: $VERSION (prerelease=$( [ "$MAJOR" = "0" ] && echo true || echo false ))"
