name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Manual tag push cancels any running main-merge build
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For tag pushes: check out the tagged commit
          # For branch pushes: check out main HEAD
          ref: ${{ github.ref }}
          fetch-depth: 0

      # Auto-tag patch on branch push only (tag pushes already have a tag)
      - name: Auto-tag patch version
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          # Skip if HEAD already has a version tag (e.g. manual minor/major tag pushed before merge)
          EXISTING=$(git tag --points-at HEAD 2>/dev/null | grep '^v' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING"
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Auto-tagged: $NEW_TAG"

      # Log the version that will be baked into the build
      - name: Resolve build version
        id: version
        run: |
          VERSION=$(git describe --tags --always)
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify version in build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Expected version: $VERSION"
          echo "index.html meta:"
          grep 'app-version' dist/index.html || true
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "CandleScan" dist/index.html || { echo "CandleScan not in index.html"; exit 1; }
          echo "Build OK"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
