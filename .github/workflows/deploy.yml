name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # full history for git describe --tags

      # Auto-tag: every main push gets a version tag automatically.
      # - If HEAD already has a tag (manual minor/major bump) â†’ skip
      # - Otherwise â†’ increment patch from latest tag
      # The build step ALWAYS runs after this, so git describe picks up the new tag.
      - name: Auto-tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          EXISTING=$(git tag --points-at HEAD 2>/dev/null | grep '^v' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING"
            echo "version=$EXISTING" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Auto-tagged: $NEW_TAG"
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT
        id: version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Smoke check â€” verify dist contains app
        run: |
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "CandleScan" dist/index.html || { echo "index.html does not contain CandleScan"; exit 1; }
          # Verify version in built HTML
          VERSION="${{ steps.version.outputs.version }}"
          if [ -n "$VERSION" ]; then
            grep -q "$VERSION" dist/index.html && echo "Version $VERSION found in build" || echo "Warning: $VERSION not in index.html meta"
          fi
          echo "Smoke check passed"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
