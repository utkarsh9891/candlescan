name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Any new push (branch or tag) cancels the current running deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Run tests FIRST — nothing else happens if tests fail
      - run: npm test

      # Auto-tag patch ONLY after tests pass (branch pushes only)
      - name: Auto-tag patch version
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          # Skip if HEAD already has a version tag
          EXISTING=$(git tag --points-at HEAD 2>/dev/null | grep '^v' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING — skipping auto-tag"
            exit 0
          fi

          # Find the highest existing tag by semver (not by commit distance)
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag (by semver): $LATEST"

          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Auto-tagged: $NEW_TAG"

      # Resolve the version to bake into the build
      # For tag pushes: use the exact tag name (avoids git describe ambiguity with multiple tags on same commit)
      # For branch pushes: use git describe (which picks up the auto-tag just created)
      - name: Resolve build version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --always)
          fi
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with explicit version
        run: npm run build
        env:
          CANDLESCAN_VERSION: ${{ steps.version.outputs.version }}

      - name: Verify version in build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Expected version: $VERSION"
          echo "index.html meta:"
          grep 'app-version' dist/index.html || true
          # Verify the meta tag contains the correct version
          grep -q "content=\"$VERSION\"" dist/index.html || { echo "WARNING: version mismatch in meta tag"; }
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "CandleScan" dist/index.html || { echo "CandleScan not in index.html"; exit 1; }
          echo "Build OK — version: $VERSION"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # Create GitHub Release (prerelease for 0.x.y, full release for 1.0.0+)
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)

          # Delete any existing release for this tag (idempotent re-runs)
          gh release delete "$VERSION" --yes 2>/dev/null || true

          if [ "$MAJOR" = "0" ]; then
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              --prerelease
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes
          fi
          echo "Created release: $VERSION (prerelease=$( [ "$MAJOR" = "0" ] && echo true || echo false ))"
