name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # full history for git describe --tags

      # Auto-tag patch on branch push only (not on tag push)
      - name: Auto-tag patch version
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch all tags to ensure we see manually pushed tags
          git fetch --tags --force

          # Skip if HEAD is already tagged (manual tag like v0.7.0 already exists)
          EXISTING=$(git tag --points-at HEAD 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING — skipping auto-tag"
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Auto-tagged: $NEW_TAG"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Smoke check — verify dist contains app
        run: |
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "CandleScan" dist/index.html || { echo "index.html does not contain CandleScan"; exit 1; }
          echo "Smoke check passed"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
